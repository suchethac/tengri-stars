name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # The dsps 0.4.8 PyPI sdist breaks setuptools-scm version detection at
  # install time; pretend-version sidesteps it (same guard as tengri CI).
  SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DSPS: "0.4.7"
  JAX_PLATFORMS: cpu

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -q
